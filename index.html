<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KScript.gg | Elite Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05050a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, rgba(112, 0, 255, 0.05) 100%);
            filter: blur(120px);
            z-index: -1;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: bold;
            background: linear-gradient(to right, #00f2ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            width: 250px;
            padding: 15px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        .nav-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: #00f2ff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            transform: scale(1.05);
        }

        .nav-btn.alt {
            border-color: rgba(112, 0, 255, 0.3);
        }

        .nav-btn.alt:hover {
            border-color: #7000ff;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div>
        <div class="logo">KSCRIPT.GG</div>
        
        <div class="btn-container">
            <a href="#" class="nav-btn">SCRIPTS</a>
            
            <a href="https://www.mediafire.com/file/w0oiiip3vqril0i/Xeno-v1.3.25b2.exe/file" target="_blank" class="nav-btn alt">EXECUTOR</a>
        </div>
    </div>

</body>
</html>
